# nginx — SITE ESTÁTICO (sem cloaker). Cloaker Adspect REMOVIDO em 2026-07-20:
# domínio em revisão no Google → serve apenas index.html (Framework Ministry) + privacy.
# Sem index.php, sem /go/, sem PHP.
server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    # anti-footprint: redirect relativo (não vaza host Easypanel atrás do Bunny).
    absolute_redirect off;
    port_in_redirect off;

    location / { try_files $uri $uri/ $uri.html =404; }
}
