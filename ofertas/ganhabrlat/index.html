<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conteúdo em vídeo</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Utmify Pixel Google -->
  <script>
    window.googlePixelId = "6a079de24b406979824cd6ac";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel-google.js");
    document.head.appendChild(a);
  </script>

  <!-- Utmify UTM capture -->
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>

  <!-- RedTrack LP View tracking -->
  <script type="text/javascript" src="https://ohjzb.ttrk.io/trackcl.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.6;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    .topbar-inner {
      max-width: 720px;
      margin: 0 auto;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .lead {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 36px;
      max-width: 520px;
    }

    .cta-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 6px;
      transition: background 0.15s ease;
    }
    .cta-btn:hover { background: var(--accent-hover); }

    footer {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">Conteúdo</div>
  </div>

  <main>
    <h1>Acessar conteúdo em vídeo</h1>
    <p class="lead">
      Clique no botão abaixo para visualizar o conteúdo.
    </p>

    <a class="cta-btn" id="cta-main" href="frontyt.html">Continuar &rarr;</a>
  </main>

  <footer>
    &copy; <span id="year"></span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Preserva query params (tftk + rtkcid + utms + gclid) no CTA ──
    (function forwardParams() {
      var params = window.location.search;
      if (!params) return;
      var cta = document.getElementById('cta-main');
      try {
        var url = new URL(cta.href, window.location.href);
        new URLSearchParams(params).forEach(function (val, key) { url.searchParams.set(key, val); });
        cta.href = url.toString();
      } catch (_) {}
    })();
  </script>

</body>
</html>
