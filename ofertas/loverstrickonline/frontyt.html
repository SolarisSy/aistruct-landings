    <style>
      :root{
        --bg:#080808;
        --surface:#0f0f11;
        --surface2:#141416;
        --ink:#f0eef4;
        --muted:#8a8a96;
        --faint:#2e2e36;
        --pink:#e8529a;
        --pink-soft:#f07ab8;
        --pink-border:rgba(232,82,154,0.18);

        --g0:#00e896;
        --g1:#00c97a;
        --g2:#00a862;
        --green-ring:rgba(0,210,130,0.28);
      }

      *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
      html,body{background:var(--bg);color:var(--ink);margin:0;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}

      ::-webkit-scrollbar{width:6px}
      ::-webkit-scrollbar-track{background:var(--bg)}
      ::-webkit-scrollbar-thumb{background:#2a2a30;border-radius:999px}

      /* ── SHIMMER ── */
      @keyframes shimmer{
        0%{background-position:200% center}
        100%{background-position:-200% center}
      }

      /* ── FLOAT + GLOW GREEN ── */
      @keyframes floatGreen{
        0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(0,0,0,0),0 0 0 rgba(0,210,130,0)}
        50%{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 40px rgba(0,210,130,.5)}
      }

      /* ── FLOAT + GLOW PINK ── */
      @keyframes floatPink{
        0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(0,0,0,0),0 0 0 rgba(232,82,154,0)}
        50%{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 40px rgba(232,82,154,.5)}
      }

      /* ── SPARKLE ── */
      @keyframes sparkle{
        0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
        50%{opacity:1;transform:scale(1) rotate(180deg)}
      }

      /* ── BASE BUTTON ── */
      .btn{
        position:relative;
        display:inline-flex;align-items:center;justify-content:center;
        font-weight:800;border-radius:999px;
        padding:1rem 2.4rem;
        cursor:pointer;user-select:none;border:none;outline:none;
        text-transform:uppercase;letter-spacing:.09em;font-size:.8rem;
        text-decoration:none;
        overflow:hidden;
        transition:filter .18s ease;
        -webkit-transform:translateZ(0);transform:translateZ(0);
      }
      .btn:active{transform:scale(.96) translateZ(0) !important;filter:brightness(.93)}

      /* ── GREEN BUTTON ── */
      .btn-green{
        background:linear-gradient(110deg,#004d28 0%,#00e896 25%,#aaffd8 45%,#00c97a 55%,#00e896 75%,#004d28 100%);
        background-size:250% auto;
        color:#002b18;
        text-shadow:0 1px 1px rgba(180,255,220,.35);
        animation:shimmer 2.8s linear infinite, floatGreen 2.4s ease-in-out infinite;
      }
      .btn-green::before{
        content:"✦ ";
        font-size:.7rem;margin-right:.4rem;opacity:.85;
        animation:sparkle 1.8s ease-in-out infinite;
      }
      .btn-green::after{
        content:" ✦";
        font-size:.7rem;margin-left:.4rem;opacity:.85;
        animation:sparkle 1.8s ease-in-out infinite .9s;
      }
      .btn-green:hover{filter:brightness(1.12) saturate(1.2);transform:translateY(-3px) scale(1.06) !important;}

      /* wrapper borda verde */
      .btn-green-wrap{
        display:inline-block;border-radius:999px;padding:3px;
        background:linear-gradient(110deg,#00e896,#aaffd8,#00e896);
        background-size:200% auto;
        animation:shimmer 2s linear infinite;
      }

      /* ── PINK BUTTON ── */
      .btn-pink{
        background:linear-gradient(110deg,#6b0030 0%,#e8529a 25%,#ffc0dd 45%,#f07ab8 55%,#e8529a 75%,#6b0030 100%);
        background-size:250% auto;
        color:#fff;
        text-shadow:0 1px 1px rgba(255,180,220,.35);
        animation:shimmer 2.8s linear infinite, floatPink 2.4s ease-in-out infinite;
      }
      .btn-pink::before{
        content:"✦ ";
        font-size:.7rem;margin-right:.4rem;opacity:.85;
        animation:sparkle 1.8s ease-in-out infinite;
      }
      .btn-pink::after{
        content:" ✦";
        font-size:.7rem;margin-left:.4rem;opacity:.85;
        animation:sparkle 1.8s ease-in-out infinite .9s;
      }
      .btn-pink:hover{filter:brightness(1.12) saturate(1.2);transform:translateY(-3px) scale(1.06) !important;}

      /* wrapper borda rosa */
      .btn-pink-wrap{
        display:inline-block;border-radius:999px;padding:3px;
        background:linear-gradient(110deg,#e8529a,#ffc0dd,#e8529a);
        background-size:200% auto;
        animation:shimmer 2s linear infinite;
      }

      /* ── DEMAIS ESTILOS ── */
      .card{background:var(--surface);border:1px solid var(--faint);border-radius:18px}
      .proof-card{
        background:var(--surface2);border:1px solid var(--faint);
        border-radius:14px;padding:.9rem 1rem;
        display:flex;align-items:center;gap:.75rem;
      }
      .proof-icon{
        width:34px;height:34px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        flex-shrink:0;font-size:.95rem;
      }

      .badge{
        display:inline-block;border-radius:999px;padding:.28rem .85rem;
        font-weight:700;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;
      }
      .badge-pink{background:rgba(232,82,154,.13);color:var(--pink-soft);border:1px solid var(--pink-border)}

      .price-block{
        background:linear-gradient(150deg,#110c0f 0%,#0f0f11 70%);
        border:1px solid var(--pink-border);border-radius:24px;
        padding:1.6rem 1.4rem 1.8rem;
        position:relative;overflow:hidden;
      }
      .price-block::before{
        content:'';position:absolute;top:-70px;right:-70px;
        width:200px;height:200px;border-radius:50%;
        background:radial-gradient(circle,rgba(232,82,154,.1) 0%,transparent 70%);
        pointer-events:none;
      }

      .price-new{
        background:linear-gradient(90deg,#f07ab8,#e8529a,#f09ac8,#e8529a);
        background-size:250% auto;
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        background-clip:text;
        animation:shimmer 3.2s linear infinite;
      }

      .testi-card{background:var(--surface);border:1px solid var(--faint);border-radius:18px;overflow:hidden}
      .testi-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
      .testi-body{padding:1rem 1rem 1.1rem}
      .stars{color:#f59e0b;font-size:.82rem;letter-spacing:.04em;margin-bottom:.4rem}

      details{border-radius:14px;background:var(--surface);border:1px solid var(--faint);margin-bottom:.55rem;overflow:hidden}
      details summary{
        padding:.95rem 1.1rem;cursor:pointer;
        font-weight:600;font-size:.9rem;color:var(--pink-soft);
        list-style:none;display:flex;align-items:center;justify-content:space-between;
        -webkit-user-select:none;user-select:none;
      }
      details summary::-webkit-details-marker{display:none}
      details summary::after{content:'＋';font-size:1rem;color:var(--muted);flex-shrink:0;margin-left:.5rem}
      details[open] summary::after{content:'−'}
      .answer{padding:.75rem 1.1rem 1rem;color:#aaa4b6;font-size:.85rem;line-height:1.72;border-top:1px solid var(--faint)}

      .divider{height:1px;background:linear-gradient(90deg,transparent,var(--faint) 40%,var(--faint) 60%,transparent);margin:2rem 0}

      .hidden-by-gate{opacity:0;transform:translateY(10px);pointer-events:none}
      .hidden-by-gate.show{
        opacity:1;transform:translateY(0);pointer-events:auto;
        transition:opacity .7s ease,transform .7s ease;
      }

      @media(max-width:640px){
        .btn{padding:.95rem 1.8rem;font-size:.78rem;width:100%}
        .btn-green-wrap,.btn-pink-wrap{width:100%}
        .price-block{padding:1.4rem 1.2rem 1.6rem}
      }
    </style>
  </head>

        let mounted = false;

        function applyUtms(root){
          // passthrough REAL: faz MERGE dos params da entrada nos links de checkout —
          // o link ds24 já tem ?aff&cam, então append-só-se-vazio NÃO funcionava (bug).
          const incoming = new URLSearchParams(location.search);
          if(![...incoming].length) return;
          // ds24 sub-tracking: cam = campanha real do clique (fallbacks; '' mantém o cam do link)
          const camVal = incoming.get('utm_campaign') || incoming.get('utm_source')
                      || incoming.get('cam') || incoming.get('src') || '';
          root.querySelectorAll('a[href^="http"]').forEach(a => {
            const url = new URL(a.href);
            // anexa cada param de entrada que o link ainda NÃO tem (preserva aff + cam baked)
            incoming.forEach((v, k) => { if(!url.searchParams.has(k)) url.searchParams.set(k, v); });
            // cam dinâmico p/ ds24: só sobrescreve quando a entrada trouxe campanha/src real
            if(camVal) url.searchParams.set('cam', camVal);
            a.href = url.toString();
          });
        }

        function inject(){
          if(mounted) return;
          mounted = true;
          const bin = atob(B64);
          const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
          mount.innerHTML = new TextDecoder('utf-8').decode(bytes);   // UTF-8 safe (emojis/—)
          const y = mount.querySelector('#y');
          if(y) y.textContent = new Date().getFullYear();
          applyUtms(mount);                                           // UTMs nos links injetados
          requestAnimationFrame(() => mount.classList.add('show'));   // fade-in
        }

        function unlock(sec){ if(sec >= gateSec) inject(); }

        function attach(tries=0){
          const inst = window.smartplayer?.instances?.[0];
          if(!inst){ if(tries<40) setTimeout(() => attach(tries+1), 250); return; }
          const tick = () => unlock(inst.video?.currentTime || 0);    // amarrado ao VÍDEO, não setTimeout
          inst.on("timeupdate", tick); inst.on("seeking", tick); inst.on("play", tick); tick();
        }
        attach();
      })();
    </script>
