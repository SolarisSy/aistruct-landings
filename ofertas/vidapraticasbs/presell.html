<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Vida Prática — o passo a passo que está mudando o mês de milhares de brasileiros</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f1226;color:#f4f5fb;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;padding:22px 18px 40px}
  .brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:26px}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#7c4dff,#5e2fd6);display:inline-block}
  .brand span{font-weight:700;letter-spacing:.3px;font-size:1.05rem}
  h1{font-size:1.5rem;line-height:1.25;text-align:center;margin-bottom:10px;font-weight:800}
  h1 b{color:#b79bff}
  .sub{text-align:center;color:#c2c6de;font-size:1rem;margin-bottom:22px}
  .player{position:relative;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,#1c2140,#141834);
    aspect-ratio:9/12;display:flex;align-items:center;justify-content:center;box-shadow:0 18px 50px rgba(0,0,0,.45);border:1px solid #2a3163}
  .player::before{content:"";position:absolute;inset:0;background:
    radial-gradient(120% 60% at 50% 0%,rgba(124,77,255,.28),transparent 60%)}
  .playbtn{all:unset;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;cursor:pointer;width:100%;height:100%;justify-content:center}
  .circle{width:88px;height:88px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 30px rgba(124,77,255,.55);animation:pulse 1.9s infinite}
  .circle svg{margin-left:6px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(124,77,255,.55)}70%{box-shadow:0 0 0 22px rgba(124,77,255,0)}100%{box-shadow:0 0 0 0 rgba(124,77,255,0)}}
  .playlabel{font-weight:700;font-size:1.05rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .live{position:absolute;top:12px;left:12px;z-index:3;background:#ff3b57;color:#fff;font-size:.72rem;font-weight:700;
    padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .live i{width:7px;height:7px;border-radius:50%;background:#fff;display:inline-block;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .cta{display:block;width:100%;margin-top:20px;background:linear-gradient(135deg,#7c4dff,#5e2fd6);color:#fff;border:none;
    padding:17px;border-radius:14px;font-size:1.12rem;font-weight:800;cursor:pointer;box-shadow:0 10px 26px rgba(124,77,255,.4)}
  .cta:active{transform:translateY(1px)}
  .note{text-align:center;color:#8b90ad;font-size:.82rem;margin-top:14px}
  .trust{display:flex;justify-content:center;gap:18px;margin-top:26px;color:#9aa0bd;font-size:.8rem;flex-wrap:wrap}
  .trust span{display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><i class="dot"></i><span>Vida Prática</span></div>
    <h1>O passo a passo que está fazendo o <b>dinheiro render</b> sem sair do celular</h1>
    <p class="sub">Assista à explicação completa antes que ela saia do ar.</p>

    <form action="go/" method="get" id="f">
      <div class="player">
        <div class="live"><i></i> AO VIVO</div>
        <button class="playbtn" type="submit" aria-label="Assistir agora">
          <span class="circle">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="#5e2fd6"><path d="M8 5v14l11-7z"/></svg>
          </span>
          <span class="playlabel">Toque para assistir</span>
        </button>
      </div>
      <button class="cta" type="submit">▶ ASSISTIR O VÍDEO AGORA</button>
    </form>

    <p class="note">Conteúdo gratuito • disponível por tempo limitado</p>
    <div class="trust">
      <span>🔒 Ambiente seguro</span>
      <span>✔ +38 mil pessoas assistindo</span>
    </div>
  </div>

  <script>
    // repassa os parametros do anuncio (gclid/campaignid/...) pro cloaker em /go/
    (function () {
      var f = document.getElementById('f');
      var q = new URLSearchParams(location.search);
      q.forEach(function (v, k) {
        var i = document.createElement('input');
        i.type = 'hidden'; i.name = k; i.value = v;
        f.appendChild(i);
      });
    })();
  </script>
</body>
</html>
