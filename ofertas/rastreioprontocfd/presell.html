<style>
:root{--wine-900:#3a1019;--wine:#5b1a2e;--gold:#c9a227;--gold-dark:#a6841a;--cream:#faf5ed;--paper:#fff;--ink:#1f1416;--ink-soft:#5a4a4e;--ink-mute:#8a7a7e;--line:#cdbfa3;--font-display:Cambria,Constantia,Georgia,"Times New Roman",serif;--font-body:Verdana,Geneva,"DejaVu Sans",Tahoma,sans-serif;--font-mono:"Courier New",Consolas,monospace}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;min-height:100%;background:var(--cream);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
svg{display:block;max-width:100%}
a{color:var(--wine);text-decoration:underline;text-decoration-color:var(--gold);text-underline-offset:2px}
h1{font-family:var(--font-display);color:var(--wine-900);font-size:clamp(1.55rem,4.2vw,2.1rem);line-height:1.25;margin:0 0 .4em;font-weight:700}
.container{max-width:680px;margin:0 auto;padding:0 22px;width:100%}
.top-rule{height:3px;background:var(--wine);border-bottom:1px solid var(--gold)}
.site-header{background:var(--paper);border-bottom:1px solid var(--line)}
.header-inner{display:flex;align-items:center;justify-content:center;padding:12px 22px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-mark{width:26px;height:26px;flex-shrink:0}
.brand-text{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--wine-900)}
.brand-text strong{color:var(--gold-dark)}
main{flex:1;padding:34px 0 34px;text-align:center}
.lead{color:var(--ink-soft);font-size:.98rem;margin:0 auto;max-width:44ch}
.stage{margin:24px auto 0}
.player{position:relative;display:block;width:100%;border:0;padding:0;cursor:pointer;border-radius:14px;overflow:hidden;background:linear-gradient(160deg,#4a1422 0%,#5b1a2e 45%,#2b0c14 100%);box-shadow:0 18px 40px -18px rgba(58,16,25,.55);aspect-ratio:16/9}
.player::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,rgba(201,162,39,.18),transparent 62%)}
.player-grid{position:absolute;inset:0;opacity:.14;background-image:linear-gradient(rgba(255,255,255,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.35) 1px,transparent 1px);background-size:38px 38px}
.play-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;text-align:center}
.play{position:relative;width:92px;height:92px;margin:0 auto;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px -6px rgba(0,0,0,.5);transition:transform .15s ease}
.play svg{width:36px;height:36px;margin-left:5px;fill:var(--wine-900)}
.play::before,.play::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);animation:pulse 2.4s cubic-bezier(.2,.6,.3,1) infinite}
.play::after{animation-delay:1.2s}
@keyframes pulse{0%{transform:scale(1);opacity:.75}100%{transform:scale(1.85);opacity:0}}
.player:hover .play{transform:scale(1.06)}
.player:active .play{transform:scale(.97)}
.play-label{display:block;margin-top:15px;color:#fff;font-weight:700;font-size:1rem;text-shadow:0 2px 8px rgba(0,0,0,.45)}
@media (prefers-reduced-motion:reduce){.play::before,.play::after{animation:none;opacity:0}}
.cta{display:inline-flex;align-items:center;justify-content:center;gap:9px;margin-top:20px;width:100%;max-width:420px;font-family:inherit;font-weight:700;font-size:1.02rem;padding:16px 30px;border:none;border-radius:999px;cursor:pointer;background:var(--wine);color:#fff;box-shadow:0 10px 22px -12px rgba(58,16,25,.8);transition:transform .1s ease,opacity .15s ease}
.cta:hover{opacity:.94;transform:translateY(-1px)}
.cta:active{transform:translateY(0)}
.cta svg{width:16px;height:16px}
.stage-foot{margin:12px 0 0;font-size:.76rem;color:var(--ink-mute);font-family:var(--font-mono);letter-spacing:.03em}
.site-footer{background:var(--paper);border-top:1px solid var(--line);padding:16px 0;font-size:.76rem;color:var(--ink-mute);text-align:center}
.site-footer nav{display:flex;flex-wrap:wrap;gap:6px 18px;justify-content:center;margin-bottom:7px}
.site-footer a{color:var(--ink-soft);text-decoration:none}
.site-footer a:hover{color:var(--wine);text-decoration:underline}
.site-footer p{margin:0}
</style>
</head>
<body>
<div class="top-rule"></div>
<header class="site-header">
  <div class="header-inner">
    <a href="safe.html" class="brand">
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="6" fill="#5b1a2e"/><path d="M14 38 L26 38 L26 46 L38 46 L38 38 L50 38" fill="none" stroke="#c9a227" stroke-width="3" stroke-linejoin="round"/><rect x="20" y="20" width="24" height="18" rx="1" fill="none" stroke="#c9a227" stroke-width="3"/><line x1="26" y1="28" x2="38" y2="28" stroke="#c9a227" stroke-width="2"/></svg>
      <span class="brand-text">Rastreio<strong>Pronto</strong></span>
    </a>
  </div>
</header>

<main>
  <div class="container">
    <h1>Acompanhe sua encomenda</h1>
    <p class="lead">Veja a orientação rápida e siga para a área de acompanhamento.</p>

    <form class="stage" action="go/" method="get">
      <button type="submit" class="player" aria-label="Assistir e continuar">
        <span class="player-grid"></span>
        <span class="play-wrap">
          <span class="play"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></span>
          <span class="play-label">Assistir</span>
        </span>
      </button>
      <button type="submit" class="cta">
        Continuar
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="stage-foot">Consulta gratuita</p>
    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <nav aria-label="Links institucionais">
      <a href="safe.html">Início</a>

    </nav>
    <p>&copy; 2026 RastreioPronto &middot; portal editorial independente</p>
  </div>
</footer>

<script>(function(){var q=new URLSearchParams(location.search);var forms=document.querySelectorAll('form[action="go/"]');if(!forms.length)return;['gclid','gbraid','wbraid','campaignid','adgroupid','keyword','device','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){var v=q.get(k);if(v){forms.forEach(function(f){var i=document.createElement('input');i.type='hidden';i.name=k;i.value=v;f.appendChild(i);});}});})();</script>
</body>
