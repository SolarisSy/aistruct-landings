<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RastreioPronto — Organize suas compras em um só lugar</title>

<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="RastreioPronto — Organize suas compras em um só lugar">

<meta property="og:url" content="https://rastreiopronto.cfd/">
<meta property="og:site_name" content="RastreioPronto">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='6' fill='%235b1a2e'/%3E%3Cpath d='M14 38 L26 38 L26 46 L38 46 L38 38 L50 38' fill='none' stroke='%23c9a227' stroke-width='3' stroke-linejoin='round'/%3E%3Crect x='20' y='20' width='24' height='18' rx='1' fill='none' stroke='%23c9a227' stroke-width='3'/%3E%3Cline x1='26' y1='28' x2='38' y2='28' stroke='%23c9a227' stroke-width='2'/%3E%3C/svg%3E">
<style>
:root{
  --wine-900:#3a1019;
  --wine:#5b1a2e;
  --wine-soft:#7a2a40;
  --gold:#c9a227;
  --gold-dark:#a6841a;
  --cream:#faf5ed;
  --paper:#ffffff;
  --ink:#1f1416;
  --ink-soft:#5a4a4e;
  --ink-mute:#8a7a7e;
  --font-display:Cambria,Constantia,"Hoefler Text",Georgia,"Times New Roman",serif;
  --font-body:Verdana,Geneva,"DejaVu Sans",Tahoma,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;min-height:100vh;
  background:var(--cream);color:var(--ink);
  font-family:var(--font-body);font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;
}
.wrap{max-width:520px;width:100%;text-align:center}
.brand{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--font-display);font-size:1.25rem;font-weight:700;
  color:var(--wine-900);letter-spacing:-.01em;margin-bottom:28px;
}
.brand-mark{width:30px;height:30px;flex-shrink:0}
.brand strong{color:var(--wine)}
h1{
  font-family:var(--font-display);color:var(--wine-900);
  font-size:clamp(1.7rem,5.5vw,2.3rem);line-height:1.2;letter-spacing:-.015em;
  margin:0 0 14px;font-weight:700;
}
.lede{
  color:var(--ink-soft);font-size:1.02rem;line-height:1.55;
  margin:0 auto 32px;max-width:34ch;
}
.cta-form{margin:0}
.cta{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;max-width:420px;
  font-family:var(--font-body);font-weight:700;font-size:1.08rem;
  padding:18px 24px;border-radius:8px;cursor:pointer;
  border:2px solid var(--gold-dark);
  background:var(--gold);color:var(--wine-900);
  text-decoration:none;
  transition:transform .12s ease,background .15s ease,box-shadow .15s ease;
  box-shadow:0 4px 0 var(--wine);
}
.cta:hover{background:var(--gold-dark);color:var(--paper);transform:translateY(-1px)}
.cta:active{transform:translateY(2px);box-shadow:0 2px 0 var(--wine)}
.cta svg{width:20px;height:20px;flex-shrink:0}
.note{margin:22px 0 0;color:var(--ink-mute);font-size:.8rem;line-height:1.4}
.note a{color:var(--wine-soft);text-decoration:underline}
.footer-line{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px;font-size:.72rem;color:var(--ink-mute);
  background:transparent;text-align:center;
}
@media (max-height:600px){body{justify-content:flex-start;padding-top:32px}.footer-line{position:static;margin-top:24px}}
</style>
</head>
<body>
<div class="wrap">
  <span class="brand">
    <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="6" fill="#5b1a2e"/><path d="M14 38 L26 38 L26 46 L38 46 L38 38 L50 38" fill="none" stroke="#c9a227" stroke-width="3" stroke-linejoin="round"/><rect x="20" y="20" width="24" height="18" rx="1" fill="none" stroke="#c9a227" stroke-width="3"/><line x1="26" y1="28" x2="38" y2="28" stroke="#c9a227" stroke-width="2"/></svg>
    Rastreio<strong>Pronto</strong>
  </span>

  <h1>Organize suas compras</h1>
  <p class="lede">Centralize suas compras, prazos e recibos em um painel simples.</p>

  <form action="go/" method="get" class="cta-form">
    <button type="submit" class="cta">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      Organizar minhas compras
    </button>
    <p class="note">Painel de organização pessoal · <a href="privacidade.html">Privacidade</a> · <a href="termos.html">Termos</a></p>
  </form>
</div>

<div class="footer-line">© 2026 RastreioPronto · Ferramenta de organização pessoal de compras.</div>

<script>(function(){var q=new URLSearchParams(location.search);var forms=document.querySelectorAll('form[action="go/"]');if(!forms.length)return;['gclid','gbraid','wbraid','campaignid','adgroupid','keyword','device','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){var v=q.get(k);if(v){forms.forEach(function(f){var i=document.createElement('input');i.type='hidden';i.name=k;i.value=v;f.appendChild(i);});}});})();</script>
</body>
</html>
