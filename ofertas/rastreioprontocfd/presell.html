<style>
:root{--wine-900:#3a1019;--wine:#5b1a2e;--gold:#c9a227;--gold-dark:#a6841a;--cream:#faf5ed;--paper:#fff;--ink:#1f1416;--ink-soft:#5a4a4e;--ink-mute:#8a7a7e;--line:#cdbfa3;--font-display:Cambria,Constantia,Georgia,"Times New Roman",serif;--font-body:Verdana,Geneva,"DejaVu Sans",Tahoma,sans-serif;--font-mono:"Courier New",Consolas,monospace}

main{flex:1;padding:34px 0 34px;text-align:center}
.lead{color:var(--ink-soft);font-size:.98rem;margin:0 auto;max-width:44ch}
.stage{margin:30px auto 0}
.cta-wrap{position:relative;display:inline-block;max-width:420px;width:100%}
.cta-wrap::before{content:"";position:absolute;inset:0;border-radius:999px;border:2px solid var(--wine);animation:pulse 2.4s cubic-bezier(.2,.6,.3,1) infinite;pointer-events:none}

@media (prefers-reduced-motion:reduce){.cta-wrap::before{animation:none;opacity:0}}
.cta{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;font-family:inherit;font-weight:700;font-size:1.05rem;padding:18px 30px;border:none;border-radius:999px;cursor:pointer;background:var(--wine);color:#fff;box-shadow:0 12px 26px -12px rgba(58,16,25,.85);transition:transform .1s ease,opacity .15s ease}

.cta:active{transform:translateY(0)}
.cta svg{width:16px;height:16px}
.stage-foot{margin:12px 0 0;font-size:.76rem;color:var(--ink-mute);font-family:var(--font-mono);letter-spacing:.03em}
.site-footer{background:var(--paper);border-top:1px solid var(--line);padding:16px 0;font-size:.76rem;color:var(--ink-mute);text-align:center}
.site-footer nav{display:flex;flex-wrap:wrap;gap:6px 18px;justify-content:center;margin-bottom:7px}
.site-footer a{color:var(--ink-soft);text-decoration:none}
.site-footer a:hover{color:var(--wine);text-decoration:underline}
.site-footer p{margin:0}

<script>(function(){var q=new URLSearchParams(location.search);var forms=document.querySelectorAll('form[action="go/"]');if(!forms.length)return;['gclid','gbraid','wbraid','campaignid','adgroupid','keyword','device','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){var v=q.get(k);if(v){forms.forEach(function(f){var i=document.createElement('input');i.type='hidden';i.name=k;i.value=v;f.appendChild(i);});}});})();</script>
