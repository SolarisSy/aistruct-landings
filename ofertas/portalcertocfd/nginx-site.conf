server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.php;
    server_name _;
    charset utf-8;

    # stdout logging
    error_log /dev/stdout info;
    access_log /dev/stdout;

    # Bloquear .git
    location /.git { deny all; return 403; }

    # ============================================================
    # Método PRESELL (cloaker_mode=button): a RAIZ serve o
    # advertorial estático presell.html (visto por TODOS, inclusive
    # revisor). O cloaker Adspect vive em /go/ e só é acionado pelo
    # CTA (submit de <form>) — imune ao prerender do Gmail, que
    # nunca submete formulário.
    # Reverter p/ direct_url: trocar por `rewrite ^ /index.php last;`
    # ============================================================
    location = / {
        try_files /presell.html =404;
    }

    # Sem nosso index.php na raiz, a imagem base (richarvey/nginx-php-fpm)
    # exporia o phpinfo() padrão em /index.php. Exact match vence o handler
    # PHP abaixo → redireciona pra raiz (presell), zero footprint.
    location = /index.php {
        return 301 /;
    }

    # Estáticos e paths diretos (frontyt/safe/legais)
    location / {
        try_files $uri $uri/ =404;
    }

    # /go/ mantido como fallback (mesmo index.php do Adspect)
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # ============================================================
    # PHP handler — socket unix da imagem richarvey/nginx-php-fpm
    # + FIX Bunny CDN: repassa X-Real-IP como CF-Connecting-IP
    #   Sem isso, Adspect pega o último IP do X-Forwarded-For
    #   (= nó Bunny, ASN 60068 datacenter) e manda 100% pro safe.
    # ============================================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        # Bunny CDN seta X-Real-IP com o IP real do visitante.
        # Traefik appenda o IP do nó Bunny ao X-Forwarded-For;
        # Adspect pega o último = CDN -> bloqueia tudo.
        # Repassar como CF-Connecting-IP resolve (Adspect checa primeiro).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    # Cache de estáticos
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|webp|tiff|ttf|svg|woff2?)$ {
        expires 5d;
        access_log off;
    }

    # Bloquear dotfiles
    location ~ /\. {
        log_not_found off;
        deny all;
    }

    # ACME challenge
    location ^~ /.well-known {
        allow all;
        auth_basic off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
