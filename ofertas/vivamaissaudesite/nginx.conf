# nginx — CLOAKER NO URL (Facebook, direct_url): a RAIZ roda o Adspect (index.php).
# Qualificado -> 302 front do parceiro (money externo); bot/revisor -> 302 /safe.html (nossa whitepage).
server {
    listen 80 default_server;
    root /var/www/html;
    index safe.html;
    absolute_redirect off;
    port_in_redirect off;
    location = / {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }
    location / { try_files $uri $uri/ $uri.html =404; }
    location /go/ { index index.php; try_files $uri /go/index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }
}
