# nginx — CLOAKER NO URL (entry filter): a RAIZ executa o Adspect (index.php). A URL anunciada no
# Google É o cloaker. Sem presell — qualificado → 302 frontyt.html (VSL money); bot/revisor → 302 safe.html.
# Mesmo stream Adspect do /go/. frontyt/safe acessíveis por path direto (alvos do 302).
# (método direct_url — ver direct_url_setup.md; flag cloaker_mode no manifest/variant)
server {
    listen 80 default_server;
    root /var/www/html;
    charset utf-8;
    server_tokens off;

    # anti-footprint: redirect relativo (não vaza host Easypanel atrás do Bunny).
    absolute_redirect off;
    port_in_redirect off;

    # ENTRY FILTER: a raiz SEMPRE roda o Adspect (index.php), antes de qualquer estático.
    location = / {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        # ⚠️ Bunny fix: repassa o IP real (X-Real-IP) como CF-Connecting-IP (1º header que o Adspect checa).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # estáticos: frontyt.html (money), safe.html, páginas legais, assets.
    location / { try_files $uri $uri/ $uri.html =404; }

    # /go/ mantido como fallback (mesmo Adspect) — compat com presell→/go/ e links antigos.
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }
}
