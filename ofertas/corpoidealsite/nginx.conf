# nginx estático — presell + filtro vTurb (SEM Adspect). A raiz serve a presell (index.html,
# pública/inócua); frontyt.html = VSL money, protegida pelo filter_rules do player vTurb.
# (método presell+vturb — estilo ganharja/loteria; migrado de direct_url/Adspect em 23/07)
server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    charset utf-8;
    server_tokens off;
    index index.html;

    # anti-footprint: redirect relativo (não vaza host Easypanel atrás do Bunny).
    absolute_redirect off;
    port_in_redirect off;

    location / { try_files $uri $uri/ $uri.html =404; }
}
