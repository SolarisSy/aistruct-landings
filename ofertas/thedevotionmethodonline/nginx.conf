# nginx — presell.html na raiz (TODOS veem); /go/ serve o Adspect PHP (filtro no CTA).
# frontyt.html (money) e safe.html são alvos do 302 do Adspect (acesso por path direto).
server {
    listen 80 default_server;
    root /var/www/html;
    index edificar-index.html;

    # anti-footprint: redirect de trailing-slash (ex.: /go → /go/) RELATIVO, não absoluto.
    # Sem isto, nginx emite Location: http://<slug>.tiectu.easypanel.host/go/ → vaza o host EP
    # (fura o mascaramento do Bunny). Pego pela funnel-qa adversarial 24/06.
    absolute_redirect off;
    port_in_redirect off;

    location / { try_files $uri $uri/ /edificar-index.html; }

    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # ⚠️ OBRIGATÓRIO atrás do Bunny: Bunny seta X-Real-IP = IP real do usuário.
        # Traefik appenda o IP do nó Bunny ao X-Forwarded-For (Adspect pegaria o último = CDN).
        # Repassar X-Real-IP como CF-Connecting-IP (header que o Adspect checa primeiro).
        # SEM ISSO: 100% dos visitantes vão pro safe.html. (lição adspect-bunny-cdn-fix)
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }
}
