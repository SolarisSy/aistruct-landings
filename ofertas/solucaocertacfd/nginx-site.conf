server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.php index.html;
    server_name _;
    charset utf-8;

    error_log /dev/stdout info;
    access_log /dev/stdout;

    error_page 404 /404.html;

    # Bloquear .git
    location /.git { deny all; return 403; }

    # ============================================================
    # Método DIRECT_URL: Adspect roda NA RAIZ (a URL anunciada no
    # Google É o cloaker). Qualificado -> 302 frontyt.html (funil
    # /inicio/) | bot/revisor -> 302 safe.html.
    # O `rewrite ... last` força reavaliação dos locations, caindo
    # no `location ~ \.php$` (senão o try_files serviria o .php
    # como estático, sem executar).
    # ============================================================
    location = / {
        rewrite ^ /index.php last;
    }

    # Estáticos, subpastas do funil (/inicio/ /home/ /chat/ /login/) e legais
    location / {
        try_files $uri $uri/ =404;
    }

    # ============================================================
    # PHP handler (index.php cloaker + api/identificacao.php)
    # socket unix da imagem richarvey/nginx-php-fpm
    # + FIX Bunny CDN: repassa X-Real-IP como CF-Connecting-IP.
    #   SEM esta linha o Adspect pega o último IP do X-Forwarded-For
    #   (= nó Bunny, ASN 60068 datacenter/NL) e manda 100% pro safe.
    #   Foi exatamente o que aconteceu (0 money_hits em 771 cliques).
    # ============================================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    # Cache de estáticos
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|webp|tiff|ttf|svg|woff2?)$ {
        expires 5d;
        access_log off;
    }

    # Bloquear dotfiles
    location ~ /\. {
        log_not_found off;
        deny all;
    }

    # ACME challenge
    location ^~ /.well-known {
        allow all;
        auth_basic off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
