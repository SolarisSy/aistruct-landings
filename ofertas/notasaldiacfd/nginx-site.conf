server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.php;
    server_name _;
    charset utf-8;

    error_log /dev/stdout info;
    access_log /dev/stdout;

    location /.git { deny all; return 403; }

    # ============================================================
    # Porteiro Taboola: Adspect roda NA RAIZ. A URL anunciada no
    # Taboola É o cloaker. Qualificado LATAM -> 302 artigo money |
    # bot/revisor/GEO fora -> 302 raiz safe (abundanciaahora.com).
    # rewrite ... last força cair no `location ~ \.php$` (senão o
    # try_files serviria o .php como texto, sem executar).
    # ============================================================
    location = / {
        rewrite ^ /index.php last;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        # Direct-to-VPS (sem Bunny): Traefik seta X-Real-IP = IP real do
        # visitante. Repassar como CF-Connecting-IP garante que o Adspect
        # avalie o IP do usuário, não o do proxy.
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    location ~ /\. {
        log_not_found off;
        deny all;
    }

    location ^~ /.well-known {
        allow all;
        auth_basic off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
