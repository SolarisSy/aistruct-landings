<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <title>Acompanhar pedido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
            padding: 20px 16px;
        }
        .card {
            max-width: 420px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
        .hd {
            background: #1e3a8a;
            color: #fff;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
        }
        .hd .dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; }
        .body { padding: 18px; }
        .code { font-size: 13px; color: #6b7280; margin-bottom: 14px; }
        .code b { color: #111827; font-family: ui-monospace, Menlo, monospace; }
        .step {
            display: flex; gap: 12px; padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .step:last-child { border-bottom: 0; }
        .step .ico {
            flex: 0 0 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .step.done .ico { background: #dcfce7; }
        .step.now  .ico { background: #dbeafe; }
        .step.wait .ico { background: #f3f4f6; }
        .step .t { font-size: 14px; font-weight: 600; }
        .step .s { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .step.wait .t, .step.wait .s { color: #9ca3af; }
    </style>
</head>

<body>
    <div class="card">
        <div class="hd"><span class="dot"></span> Rastreamento</div>
        <div class="body">
            <div class="code">Objeto <b id="cod">—</b></div>

            <div class="step done"><div class="ico">✅</div>
                <div><div class="t">Pedido postado</div><div class="s">Objeto recebido pela transportadora</div></div></div>

            <div class="step done"><div class="ico">✅</div>
                <div><div class="t">Em trânsito</div><div class="s">Encaminhado para unidade de distribuição</div></div></div>

            <div class="step now"><div class="ico">🚚</div>
                <div><div class="t">Em processo de liberação</div><div class="s">Aguardando conclusão para saída para entrega</div></div></div>

            <div class="step wait"><div class="ico">📦</div>
                <div><div class="t">Saiu para entrega</div><div class="s">—</div></div></div>
        </div>
    </div>

    <script>
        // Exibe o código de rastreio recebido via querystring (?codigo= / ?cod=), sem chamar nada externo.
        var q = new URLSearchParams(location.search);
        var c = q.get('codigo') || q.get('cod') || q.get('code') || '';
        if (c) document.getElementById('cod').textContent = c;
    </script>
</body>

</html>
