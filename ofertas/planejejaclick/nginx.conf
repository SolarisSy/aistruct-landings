server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;
    server_tokens off;

    # anti-footprint: redirect relativo (nao vaza host Easypanel atras do Bunny)
    absolute_redirect off;
    port_in_redirect off;

    location / {
        try_files $uri $uri/ /presell.html;
    }

    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        # ⚠️ Bunny fix: repassa o IP real (X-Real-IP) como CF-Connecting-IP (1º header que o Adspect checa).
        # Sem isso, o Adspect ve o IP do no Bunny (datacenter) -> manda TUDO pro safe em modo Filter.
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
