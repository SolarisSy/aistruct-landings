server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;
    server_tokens off;

    # RAIZ = presell.html (todos veem; e o que o revisor visita primeiro).
    location = / {
        try_files /presell.html =404;
    }

    # Evita expor phpinfo() de qualquer index.php default da base na raiz.
    location = /index.php {
        return 301 /;
    }

    # CTA -> go/index.php (roteamento Adspect). Sub-recursos de /go/ caem no PHP.
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # Entry da money NOVO: /chat/ carrega embed Typebot (chat/index.html).
    # O typebot-standard web component puxa chat.rastreiofacil.cfd/<publicId>.
    location /chat/ {
        try_files $uri $uri/ /chat/index.html;
    }

    # Landings HTML do CRR aprimorado (acessíveis mas entry pelo Typebot embed).
    # Cada uma é um index.html estático servido pela raiz da pasta.
    location /rastreio/       { try_files $uri $uri/ /rastreio/index.html; }
    location /chat-template/  { try_files $uri $uri/ /chat-template/index.html; }
    location /jadlog/         { try_files $uri $uri/ /jadlog/index.html; }
    location /aduaneiro/      { try_files $uri $uri/ /aduaneiro/index.html; }
    location /notafiscal/     { try_files $uri $uri/ /notafiscal/index.html; }

    # Estaticos: presell, safe, blog editorial, imagens etc.
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP: so go/index.php (Adspect). Money nao usa mais PHP (HTML estatico).
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # OBRIGATORIO com Bunny: Bunny seta X-Real-IP = IP real; Traefik appenda o
        # IP do no Bunny ao X-Forwarded-For. Adspect checa CF-Connecting-IP primeiro.
        # Sem isto, 100% do trafego cai no safe (0 money).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location ~ /\. {
        deny all;
    }
}
