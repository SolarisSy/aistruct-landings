server {
    listen 80;
    root /var/www/html;
    index index.html index.htm;
    charset utf-8;
    server_tokens off;

    # Arquivos estáticos (HTML/CSS/JS/imagens) + index.html na raiz
    location / {
        try_files $uri $uri/ =404;
    }

    # Execução de PHP (ex.: securimage_play.php)
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # Bloquear dotfiles
    location ~ /\. {
        deny all;
    }
}
