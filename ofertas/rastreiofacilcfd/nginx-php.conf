server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;
    server_tokens off;

    # RAIZ = presell.html (todos veem; e o que o revisor visita primeiro).
    location = / {
        try_files /presell.html =404;
    }

    # Evita expor phpinfo() de qualquer index.php default da base na raiz.
    location = /index.php {
        return 301 /;
    }

    # CTA -> go/index.php (roteamento Adspect). Sub-recursos de /go/ caem no PHP.
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # ── MONEY PAGE (front-controller PHP, entry Adspect) ──────────────────────
    # Entry: /rastreio.php (sem query -> case '' -> home.php).
    # Sub-rotas do template (LINK_DOMINIO.'acompanhe|confirmacao|rastreio|home')
    # sao paths absolutos -> rewrite para rastreio.php?url=<path> (QSA preserva
    # GET/POST do form). Replica o .htaccess original do zip.
    location = /rastreio.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/rastreio.php;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }
    location ~ ^/(acompanhe|confirmacao|rastreio|home)$ {
        rewrite ^/(.*)$ /rastreio.php?url=$1 last;
    }

    # Estaticos: money (/index.html, /pagina2.html, css/js/images/fonts/notafiscal),
    # presell, safe.html e paginas do blog editorial.
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP: go/index.php (Adspect) + securimage_play.php da money.
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # OBRIGATORIO com Bunny: Bunny seta X-Real-IP = IP real; Traefik appenda o
        # IP do no Bunny ao X-Forwarded-For. Adspect checa CF-Connecting-IP primeiro.
        # Sem isto, 100% do trafego cai no safe (0 money).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location ~ /\. {
        deny all;
    }
}
