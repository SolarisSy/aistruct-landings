server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;
    server_tokens off;

    # RAIZ = presell.html (todos veem; e o que o revisor visita primeiro).
    location = / {
        try_files /presell.html =404;
    }

    # Evita expor phpinfo() de qualquer index.php default da base na raiz.
    location = /index.php {
        return 301 /;
    }

    # CTA -> go/index.php (roteamento Adspect). Sub-recursos de /go/ caem no PHP.
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # Money = chat/index.html, mas servido pelo Adspect via action:local (readfile
    # do filesystem, dentro do /go/). A URL fica NEUTRA (/go/?...), nunca revela
    # /chat/. Por isso o path /chat/ NAO deve responder publico (seria crawleavel
    # fora do gate = risco Safe Browsing, ver Regra de Ouro do SETUP_CRR).
    # 404 aqui NAO afeta o action:local (Adspect le do disco, nao via HTTP).
    location /chat/ {
        return 404;
    }

    # /rastreio/ = tela de acompanhamento embutida pelo Typebot (iframe). Página
    # PRÓPRIA e limpa (sem domínio de terceiro). noindex: não deve ser rastreada
    # solta — só faz sentido dentro do fluxo. As demais pastas do template CRR
    # (jadlog/aduaneiro/notafiscal/chat-template) foram REMOVIDAS: eram checkouts
    # scam de terceiro, órfãs, e queimaram o domínio (Safe Browsing por vizinhança).
    location /rastreio/ {
        index index.html;
        try_files $uri $uri/ /rastreio/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Estaticos: presell, safe, blog editorial, imagens etc.
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP: so go/index.php (Adspect). Money nao usa mais PHP (HTML estatico).
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # OBRIGATORIO com Bunny: Bunny seta X-Real-IP = IP real; Traefik appenda o
        # IP do no Bunny ao X-Forwarded-For. Adspect checa CF-Connecting-IP primeiro.
        # Sem isto, 100% do trafego cai no safe (0 money).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location ~ /\. {
        deny all;
    }
}
