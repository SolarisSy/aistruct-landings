<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <title>Rastreio Fácil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh;
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #loader {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
            color: #4a5568;
        }
        #loader .spinner {
            width: 36px; height: 36px;
            border: 3px solid #cbd5e0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        typebot-standard:defined ~ #loader { display: none; }
        typebot-standard { display: block; width: 100%; min-height: 100vh; }
    </style>
</head>

<body>
    <typebot-standard id="typebot-embed"></typebot-standard>

    <div id="loader">
        <div class="spinner"></div>
        <div>Carregando...</div>
    </div>

    <!-- Typebot embed: @typebot.io/js v0.10.2 (ES module, web component) -->
    <script type="module">
        import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0.10.2/dist/web.js';

        Typebot.initStandard({
            typebot: 'crra',
            apiHost: 'https://chat.rastreiofacil.cfd'
        });
    </script>
</body>

</html>
