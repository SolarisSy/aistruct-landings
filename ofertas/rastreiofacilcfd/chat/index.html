<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <title>Rastreio Fácil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh;
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Loader mostrado enquanto o Typebot carrega */
        #loader {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
            color: #4a5568;
        }
        #loader .spinner {
            width: 36px; height: 36px;
            border: 3px solid #cbd5e0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Quando o typebot-standard renderiza, esconder o loader */
        typebot-standard:not(:empty) ~ #loader { display: none; }
        typebot-standard { display: block; width: 100%; min-height: 100vh; }
    </style>
</head>

<body>
    <!-- Embed Typebot (publicId sera preenchido na Fase C2) -->
    <script src="https://cdn.jsdelivr.net/npm/@typebot.io/js@0.3/dist/web.js"></script>
    <typebot-standard id="typebot-embed"></typebot-standard>

    <div id="loader">
        <div class="spinner"></div>
        <div>Carregando...</div>
    </div>

    <script>
        // Inicializa o Typebot embed (publicId 'crra' importado do JSON NEW API ATIVO)
        Typebot.initStandard({
            typebot: 'crra',
            apiHost: 'https://chat.rastreiofacil.cfd'
        });
    </script>
</body>

</html>
