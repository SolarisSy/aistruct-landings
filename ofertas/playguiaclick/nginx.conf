server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;

    # raiz = presell (todos veem; sem filtro na entrada)
    location = / { try_files /presell.html =404; }

    # protege o phpinfo() default da imagem base (index.php na raiz = footprint)
    location = /index.php { return 301 /; }

    location / { try_files $uri $uri/ /presell.html; }

    # cloaker Adspect só no CTA (/go/)
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Bunny seta X-Real-IP = IP real do visitante. Sem repassar como
        # CF-Connecting-IP, o Adspect classifica o IP do nó Bunny e manda
        # 100% pro safe.html (0 conversões).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }
}
