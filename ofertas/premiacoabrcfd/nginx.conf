server {
    listen 80 default_server;
    root /var/www/html;
    charset utf-8;
    absolute_redirect off;
    port_in_redirect off;

    # index.php na raiz — Adspect filtra direto na entrada (setup Facebook)
    location / {
        index index.php;
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # FIX OBRIGATÓRIO: Bunny seta X-Real-IP com IP real do usuário.
        # Sem isso, Adspect vê o IP do nó Bunny CDN → 100% vai pro safe.
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
