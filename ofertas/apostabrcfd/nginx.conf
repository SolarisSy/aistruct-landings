server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;

    # Entry: presell servida diretamente para TODOS (sem Adspect na entrada)
    location / {
        try_files $uri $uri/ /presell.html;
    }

    # CTA endpoint: Adspect filtra aqui -> aprovado=frontyt.html, bloqueado=safe.html
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Bunny CDN seta X-Real-IP com o IP real do usuário.
        # Adspect checa HTTP_CF_CONNECTING_IP antes de X-Forwarded-For,
        # então repassamos X-Real-IP como CF-Connecting-IP para que Adspect
        # use o IP real (não o nó Bunny que Traefik appenda ao X-Forwarded-For).
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
