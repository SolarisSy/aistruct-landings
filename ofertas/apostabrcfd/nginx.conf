server {
    listen 80 default_server;
    root /var/www/html;
    index presell.html;
    charset utf-8;

    # Entry: presell servida diretamente para TODOS (sem Adspect na entrada)
    location / {
        try_files $uri $uri/ /presell.html;
    }

    # CTA endpoint: Adspect filtra aqui -> aprovado=frontyt.html, bloqueado=safe.html
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
