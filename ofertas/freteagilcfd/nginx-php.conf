server {
    listen 80;
    root /var/www/html;
    charset utf-8;
    server_tokens off;

    # ENTRY FILTER: raiz sempre executa Adspect (index.php)
    location = / {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # Arquivos estáticos (HTML, assets, etc.)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Bloquear helpers privados
    location ~ /api/_ {
        deny all;
        return 404;
    }

    # auth.php — always dynamic, never cached by Bunny CDN
    location = /auth.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/auth.php;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_AUTH_TOKEN $http_x_auth_token;
        include fastcgi_params;
        fastcgi_read_timeout 30;
        add_header Cache-Control "no-store, no-cache, private" always;
        add_header Pragma "no-cache" always;
    }

    # PHP execution
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_AUTH_TOKEN $http_x_auth_token;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location ~ /\. {
        deny all;
    }
}
