<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Here to Watch the Video</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(circle at 50% 0%, #eef2f7 0%, #dbe2ea 100%);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    text-align:center;
  }
  a{color:inherit;text-decoration:none;}

  .card{
    background:#fff;
    max-width:900px;width:100%;
    border-radius:24px;
    padding:56px 40px 48px;
    box-shadow:0 20px 60px rgba(20,30,50,.12);
  }

  h1{
    font-size:clamp(1.7rem,4.4vw,2.6rem);
    font-weight:800;
    line-height:1.25;
    color:#111;
    letter-spacing:-.01em;
    margin-bottom:20px;
  }

  .free{
    font-size:clamp(1.3rem,3.2vw,1.9rem);
    font-weight:800;
    color:#2ba9f0;
    margin-bottom:36px;
  }

  .cta{
    display:inline-flex;align-items:center;justify-content:center;gap:12px;
    width:100%;
    background:linear-gradient(180deg,#ffd23d 0%,#ff9d0a 100%);
    color:#111;
    font-size:clamp(1.05rem,2.6vw,1.35rem);
    font-weight:800;
    padding:22px 30px;
    border-radius:999px;
    box-shadow:0 0 40px rgba(255,157,10,.55);
    animation:glow 1.6s ease-in-out infinite;
  }
  .cta:active{transform:scale(.98);}
  .cta .play{font-size:1em;}
  @keyframes glow{
    0%,100%{box-shadow:0 0 40px rgba(255,157,10,.5);}
    50%{box-shadow:0 0 60px rgba(255,157,10,.8);}
  }
  @media (prefers-reduced-motion:reduce){.cta{animation:none;}}

  footer{
    margin-top:28px;
    color:#8a94a3;
    font-size:.9rem;
  }
  footer .links a{
    color:#8a94a3;
    margin:0 8px;
  }
  footer .links a:hover{text-decoration:underline;}
  footer .copy{
    margin-top:6px;
    font-weight:600;
    color:#77808f;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>CLICK HERE TO WATCH<br>THE VIDEO</h1>
    <div class="free">100% FREE!</div>

    <a class="cta" href="https://lp.alkalean.online/preclick">
      <span class="play">▶</span> Watch now for free
    </a>
  </div>

  <footer>
    <div class="links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Use</a>
    </div>
    <div class="copy">Copyright 2026. All rights reserved.</div>
  </footer>

</body>
</html>
