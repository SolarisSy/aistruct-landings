server {
    listen 8000 default_server;
    root /var/www/html;
    index index.html;
    charset utf-8;

    absolute_redirect off;
    port_in_redirect off;

    # Estáticos: loja + safe page + assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CTA / filtro Adspect — PHP-FPM aqui
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Bunny CDN: repassar IP real do visitante ao Adspect
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    # FastAPI: checkout, pagamento, webhook, status
    location ~ ^/(checkout|obrigado|blog|healthz|debug|api|webhook) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
