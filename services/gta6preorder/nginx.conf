server {
    listen 8000 default_server;
    root /var/www/html;
    charset utf-8;

    absolute_redirect off;
    port_in_redirect off;

    # ── Adspect na RAIZ (direct_url method) ──────────────────────────────
    # Visitante em / → index.php (Adspect filtra)
    # Qualificado → 302 /ofertas | Bot/revisor → 302 /ofertas.html → Amazon
    location = / {
        rewrite ^ /index.php last;
    }

    # ── Loja real (/ofertas) ──────────────────────────────────────────────
    location = /ofertas {
        try_files /index.html =404;
    }

    # ── /go/ como fallback (mesmo stream Adspect) ────────────────────────
    location /go/ {
        index index.php;
        try_files $uri /go/index.php?$query_string;
    }

    # ── PHP-FPM (Adspect) ────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Fix obrigatório atrás do Bunny/Traefik: Adspect lê CF-Connecting-IP
        # antes do X-Forwarded-For. Traefik appenda IP do CDN ao XFF →
        # Adspect veria o nó Bunny (datacenter) e mandaria 100% pro safe.
        fastcgi_param HTTP_CF_CONNECTING_IP $http_x_real_ip;
        include fastcgi_params;
    }

    # ── FastAPI: checkout, pagamento, webhook ────────────────────────────
    location ~ ^/(checkout|obrigado|blog|healthz|debug|api|webhook) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
    }

    # ── Estáticos (assets, safe page, etc.) ──────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
