<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melhores Ofertas Gamer — Amazon Brasil</title>
  <meta name="description" content="Encontre os melhores preços em jogos, consoles e acessórios gamer na Amazon Brasil. Confira as ofertas do dia." />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #131921;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #FF9900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo span { color: #fff; }
    .sub {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 32px;
    }
    .card {
      background: #1f2937;
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      border: 1px solid #374151;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #374151;
      border-top-color: #FF9900;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .card p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: #FF9900;
      color: #131921;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="logo">amazon<span>.com.br</span></div>
  <div class="sub">Ofertas gamer do dia</div>
  <div class="card">
    <div class="spinner"></div>
    <h2>Carregando oferta…</h2>
    <p>Estamos te redirecionando para a melhor oferta disponível agora na Amazon.</p>
    <div class="badge">Prime · Entrega rápida</div>
  </div>

  <script>
    // Lista de produtos gamer na Amazon BR (ASIN + título)
    // Tag de afiliado: substitua AMZTAG pelo seu Associates ID
    var TAG = "AMZTAG";

    var produtos = [
      // Controles
      { asin: "B0CGJM399S", nome: "Controle DualSense PS5" },
      { asin: "B0CJ4Y29NT", nome: "Controle Xbox Series sem fio" },
      { asin: "B07P3BGQBD", nome: "Controle Xbox One Carbon" },
      // Headsets
      { asin: "B09XX7FGMG", nome: "Headset Logitech G535" },
      { asin: "B07NQGLQXZ", nome: "Headset HyperX Cloud Stinger" },
      { asin: "B0CTWF8N1H", nome: "Headset Sony Pulse 3D PS5" },
      // Jogos PS5
      { asin: "B09QR6VJ8M", nome: "God of War Ragnarök PS5" },
      { asin: "B09WGM15QB", nome: "Horizon Forbidden West PS5" },
      { asin: "B0BLLHN6J6", nome: "Spider-Man 2 PS5" },
      // Cadeiras / acessórios
      { asin: "B07GXWNYLC", nome: "Cadeira Gamer DXRacer" },
      { asin: "B08GYKNCCP", nome: "Mouse Gamer Logitech G305" },
      { asin: "B07BHM5RM1", nome: "Teclado Mecânico HyperX Alloy" },
    ];

    var escolhido = produtos[Math.floor(Math.random() * produtos.length)];
    var url = "https://www.amazon.com.br/dp/" + escolhido.asin
            + "/?tag=" + TAG
            + "&linkCode=as2&creative=9325&creativeASIN=" + escolhido.asin;

    // Redireciona após 1.2s (parece natural, não instantâneo)
    setTimeout(function() {
      window.location.replace(url);
    }, 1200);
  </script>
</body>
</html>
